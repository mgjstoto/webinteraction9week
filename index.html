		/*font*/
		.coding-font {font-family: 'Elice Digital Coding', bold;}
		.noto-sans-kr-<uniquifier> {
		  font-family: "Noto Sans KR", sans-serif;
		  font-optical-sizing: auto;
		  font-weight: <weight>;
		  font-style: normal;
		}


		/*animation*/
		@keyframes blink {
		   0%   { opacity: 1; }
		   40%  { opacity: 1; } 
		   50%  { opacity: 0; } 
		   60%  { opacity: 1; } 
		   100% { opacity: 1; }
			}
			.blink {
			    position: absolute;
			    top: 2.5%;
			    left: 65%;
			    animation: blink 1s infinite;
				}

		.scroll-motion {
			    position: absolute;
			    top: 51%;        
			    left: 34.8%;
			    opacity: 100;         
			    transform: rotate(-66deg) translateX(700px) translateY(-50px);  
			    transition: opacity 0.6s ease, transform 2s ease;  
			}

					
		.scroll-motion.active {
		    opacity: 1;
		    transform: rotate(-66deg) translateX(0px)  translateY(0px);  
			}


		.letter-motion {
		    letter-spacing: 0rem;       
		    opacity: 0;
		    transition: letter-spacing 1s ease, opacity 0.6s ease;
			}

		
		.letter-motion.active {
		    letter-spacing: 2.58rem;   
		    opacity: 1;
		}

		.line-motion {
		    position: absolute;
		    background-color: #FF00DD;
		    width: 65%;               
		    height: 0.05%;                
		    opacity: 1;              
		    transform-origin: left;
		    transform: rotate(27deg) scaleX(0);
		    transition: transform 1.5s ease, opacity 0.5s ease; 
		    
		    
		    top: 79.75%; 
		    left: 11%;
		}

		
		.line-motion.active {
		             
		    opacity: 1;
		    transform: rotate(27deg) scaleX(1)
		}



		.line-motion2 {
		    position: absolute;
		    background-color: #00FF26;  
		    width: 65%;               
		    height: 0.05%;               
		    opacity: 1;               
		    transform-origin: right;
		    transform: rotate(-41.7deg) scaleX(0);
		    transition: transform 1.5s ease, opacity 0.5s ease; 
		    
		    
		    top: 94.67%; 
		    left: 7.5%;
		}

		
		.line-motion2.active {
		              
		    opacity: 1;
		    transform: rotate(-41.7deg) scaleX(1)
		}

	</style>	
	<title>웹인터</title>
</head>
	<script>
	    window.addEventListener('scroll', () => {
	        const elements = document.querySelectorAll('.scroll-motion');
	        elements.forEach(el => {
	            const rect = el.getBoundingClientRect();
	            if (rect.top < window.innerHeight * 0.8) {
	                el.classList.add('active');
	            }
	        });
	    });
	</script>
	<script>
		window.addEventListener('scroll', () => {
    document.querySelectorAll('.letter-motion, .line-motion, .line-motion2').forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight * 0.8) {
            el.classList.add('active');
        }
    });
});
	</script>
